services:
  api:
    build: .
    container_name: ${PROJECT_NAME:-garoo-api}
    env_file: .env
    ports:
      - "${PORT:-3010}:${PORT:-3010}"
    restart: unless-stopped
    networks:
      - garoo-tier-1
    volumes:
      - ./public:/app/public  # para archivos generados (audio, PDFs, etc.)

networks:
  garoo-tier-1:
    external: true  # red compartida del sandbox — ver DEPLOYMENT.md para producción
